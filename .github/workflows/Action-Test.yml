name: Action-Test

run-name: "Action-Test - [${{ github.event.pull_request.title }} #${{ github.event.pull_request.number }}] by @${{ github.actor }}"

on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  ActionTestBasic:
    name: Action-Test - [Basic]
    runs-on: ubuntu-latest
    steps:
      # Need to check out as part of the test, as its a local action
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Action-Test
        uses: ./

      - name: Verify Helpers Module Installation
        shell: pwsh
        run: |
          if (Get-Module -Name Helpers -ListAvailable) {
            Write-Host "Helpers module successfully installed."
          } else {
            throw "Helpers module not found!"
          }

      - name: Run Install-PSModule regression tests
        shell: pwsh
        run: ./tests/Install-PSModule.Tests.ps1
